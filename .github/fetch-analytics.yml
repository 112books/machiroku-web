name: Fetch GoatCounter Analytics

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora
  workflow_dispatch:        # Execució manual des de GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch analytics data
        env:
          GC_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GC_ACCOUNT: machiroku
        run: |
          END=$(date +%Y-%m-%d)
          START=$(date -d '365 days ago' +%Y-%m-%d)
          BASE="https://${GC_ACCOUNT}.goatcounter.com/api/v0"
          AUTH="Authorization: Bearer ${GC_TOKEN}"

          fetch_json() {
            local url="$1"
            local result
            result=$(curl -s --max-time 15 -H "${AUTH}" "${url}")
            if echo "${result}" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
              echo "${result}"
            else
              echo "WARN: Resposta invalida per: ${url}" >&2
              echo "null"
            fi
          }

          echo "Obtenint dades del ${START} al ${END}..."

          fetch_json "${BASE}/stats/hits?start=${START}&end=${END}&limit=100"     > /tmp/hits.json
          fetch_json "${BASE}/stats/browsers?start=${START}&end=${END}&limit=10"  > /tmp/browsers.json
          fetch_json "${BASE}/stats/systems?start=${START}&end=${END}&limit=10"   > /tmp/systems.json
          fetch_json "${BASE}/stats/sizes?start=${START}&end=${END}&limit=10"     > /tmp/sizes.json
          fetch_json "${BASE}/stats/locations?start=${START}&end=${END}&limit=10" > /tmp/locations.json

          python3 scripts/build-analytics-json.py "${START}" "${END}"

      - name: Process analytics
        run: |
          python3 scripts/process-analytics.py \
            /tmp/raw_all.json \
            static/admin/analytics.json \
            "$(date -d '365 days ago' +%Y-%m-%d)" \
            "$(date +%Y-%m-%d)"

      - name: Commit analytics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/admin/analytics.json
          git diff --staged --quiet || git commit -m "chore: actualitzar analytics [skip ci]"
          git pull --rebase
          git push
