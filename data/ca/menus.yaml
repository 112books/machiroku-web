# Menús del migdia - CATALÀ
# Cada menú es mostra com a card a /oferta/

menus:
  - id: "menu-sushi"
    nom: "Menú Sushi"
    ordre: 1
    actiu: true
    preu: 14.50
    foto: "/images/menus/sushi.jpg"  # Opcional
    descripcio: "El nostre clàssic menú japonès amb varietat de sushi fresc"
    plats:
      - "Sopa miso"
      - "Amanida wakame"
      - "8 peces de sushi variats (nigiri i maki)"
      - "Postre casolà"
      - "Te verd"
    alergics:
      - "peix"
      - "gluten"
      - "soja"
      - "sesam"
    disponibilitat:
      dies: ["dilluns", "dimarts", "dijous", "divendres"]
      horari: "13:00 - 15:30"

