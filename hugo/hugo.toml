baseURL = "https://112books.github.io/machiroku-web/"
defaultContentLanguage = "ca"
defaultContentLanguageInSubdir = true
title = "Machiroku"

[languages]
[languages.ca]
languageName = "Català"
languageCode = "ca-ES"
[languages.es]
languageName = "Español"
languageCode = "es-ES"
[languages.en]
languageName = "English"
languageCode = "en-US"

[taxonomies]
  category = "categories"
  tag = "tags"

[mediaTypes]
  [mediaTypes."text/yaml"]
    suffixes = ["yaml", "yml"]

[outputFormats]
  [outputFormats.YAML]
    mediaType = "text/yaml"
    isPlainText = true

[build]
  writeStats = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
