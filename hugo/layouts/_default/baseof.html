<!doctype html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} | Machiroku</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <a href="/ca/inici/" class="logo">
        <img src="/logos/Machiroku-logo-gran-vectoritzat.svg" alt="Machiroku" style="height:38px;">
      </a>
    </div>
    <nav class="site-nav">
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/ca/inici/">Inici</a></li>
        <li><a href="/ca/oferta/">Oferta</a></li>
        <li><a href="/ca/reserves/">Reserves</a></li>
        <li><a href="/ca/contacte/">Contacte</a></li>
        <li class="lang-switch">
          <a href="/ca/inici/">CA</a>
          <a href="/es/inici/">ES</a>
          <a href="/en/inici/">EN</a>
        </li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ now.Year }} Machiroku</p>
    <a href="/ca/reserves/" class="btn btn-primary">Fer una reserva</a>
  </footer>

  <script src="/js/main.js" defer></script>
</body>
</html>
