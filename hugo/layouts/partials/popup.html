{{- $popup := site.Data.restaurant.popup -}}
{{- $lang := $.Site.Language.Lang -}}
{{- $today := now.Format "2006-01-02" -}}

{{- if and $popup.actiu (ge $today $popup.data_inici) (le $today $popup.data_fi) -}}
<div id="popup-banner" class="popup-banner" role="alert" aria-live="polite">
  <div class="popup-content">
    <h3>{{ index $popup.tema $lang }}</h3>
    <p>{{ index $popup.descripcio $lang }}</p>
    <button id="popup-close" class="popup-close" aria-label="Tancar">&times;</button>
  </div>
</div>

<script>
(function() {
  const popup = document.getElementById('popup-banner');
  const closeBtn = document.getElementById('popup-close');
  const storageKey = 'machiroku_popup_closed';
  
  // Check if user previously dismissed
  if (!localStorage.getItem(storageKey)) {
    // Show after 3 seconds
    setTimeout(function() {
      popup.classList.add('popup-visible');
    }, 3000);
  }
  
  // Close button
  closeBtn.addEventListener('click', function() {
    popup.classList.remove('popup-visible');
    localStorage.setItem(storageKey, 'true');
  });
  
  // Auto-hide after 10 seconds if not dismissed
  setTimeout(function() {
    popup.classList.remove('popup-visible');
  }, 13000);
})();
</script>
{{- end -}}
