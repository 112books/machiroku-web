backend:
  name: github
  repo: 112books/machiroku-web
  branch: main
  base_url: https://oauth.decapcms.org

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "config"
    label: "Configuració"
    files:
      - name: "restaurant"
        label: "Restaurant"
        file: "data/restaurant.yaml"
        fields:
          - { label: "Telèfon", name: "telefon", widget: "string" }
          - { label: "WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Adreça (CA)", name: "adreca", widget: "object", fields: [
              { label: "Català", name: "ca", widget: "string" },
              { label: "Castellà", name: "es", widget: "string" },
              { label: "Anglès", name: "en", widget: "string" }
            ] }
          - { label: "Google Maps URL", name: "google_maps_url", widget: "string" }

  - name: "horaris"
    label: "Horaris"
    files:
      - name: "horaris"
        label: "Horaris"
        file: "data/horaris.yaml"
        fields:
          - label: "Menú migdia"
            name: "menu"
            widget: "object"
            fields:
              - { label: "Dies (dl, dt, dc, dj, dv, ds, dg)", name: "dies", widget: "list", default: ["dl","dt","dc","dj","dv"] }
              - { label: "Obertura", name: "obertura", widget: "string", default: "13:00" }
              - { label: "Tancament", name: "tancament", widget: "string", default: "15:30" }
          - label: "Carta nit"
            name: "carta"
            widget: "object"
            fields:
              - { label: "Dies (dl, dt, dc, dj, dv, ds, dg)", name: "dies", widget: "list", default: ["dv","ds"] }
              - { label: "Obertura", name: "obertura", widget: "string", default: "19:00" }
              - { label: "Tancament", name: "tancament", widget: "string", default: "22:00" }

  - name: "popup"
    label: "Popup"
    files:
      - name: "popup"
        label: "Avís emergent"
        file: "data/restaurant.yaml"
        fields:
          - { label: "Actiu", name: "actiu", widget: "boolean", default: false }
          - label: "Tema"
            name: "tema"
            widget: "object"
            fields:
              - { label: "Català", name: "ca", widget: "string" }
              - { label: "Castellà", name: "es", widget: "string" }
              - { label: "Anglès", name: "en", widget: "string" }
          - label: "Descripció"
            name: "descripcio"
            widget: "object"
            fields:
              - { label: "Català", name: "ca", widget: "text" }
              - { label: "Castellà", name: "es", widget: "text" }
              - { label: "Anglès", name: "en", widget: "text" }
          - { label: "Data inici (YYYY-MM-DD)", name: "data_inici", widget: "string" }
          - { label: "Data fi (YYYY-MM-DD)", name: "data_fi", widget: "string" }

  - name: "menus"
    label: "Menú migdia"
    folder: "content/ca/menus"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Títol", name: "title", widget: "string" }
      - { label: "Descripció", name: "description", widget: "text", required: false }
      - { label: "Preu", name: "price", widget: "string", required: false }
      - { label: "Actiu", name: "active", widget: "boolean", default: true }
      - { label: "Contingut", name: "body", widget: "markdown" }

  - name: "carta"
    label: "Carta nit"
    folder: "content/ca/carta"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titol", name: "title", widget: "string" }
      - { label: "Categoria", name: "category", widget: "string", required: false }
      - { label: "Descripció", name: "description", widget: "text", required: false }
      - { label: "Preu", name: "price", widget: "string", required: false }
      - { label: "Actiu", name: "active", widget: "boolean", default: true }
      - { label: "Contingut", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "Pàgines"
    folder: "content/ca"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titol", name: "title", widget: "string" }
      - { label: "Contingut", name: "body", widget: "markdown" }
