<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager - Machiroku</title>
  <link rel="stylesheet" href="https://unpkg.com/sveltia-cms/dist/svelte-cms.css">
  <script src="https://unpkg.com/sveltia-cms/dist/svelte-cms.js"></script>
</head>
<body>
  <div id="cms"></div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      SveltiaCMS.init({
        repo: '112books/machiroku-web',
        branch: 'main',
        api_root: 'https://api.github.com'
      });
    });
  </script>
</body>
</html>
